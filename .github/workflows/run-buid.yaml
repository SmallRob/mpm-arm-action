name: Build ARM Offline Package

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in ARM container
        run: |
          docker run --rm \
            --platform=linux/arm64 \
            -v ${{ github.workspace }}:/app \
            -w /app/web \
            node:20-alpine \
            sh -c "
              npm install &&
              npm run build &&
              tar -czf ../app-arm64.tar.gz \
                dist \
                node_modules \
                package.json \
                package-lock.json
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64
          path: web/app-arm64.tar.gz